<!DOCTYPE html>
<html class="dark" lang="vi">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>404 — Trang không tìm thấy | CMD Security</title>
    <meta name="description" content="Trang bạn đang tìm không tồn tại. Quay về trang chủ CMD Security." />
    <meta name="robots" content="noindex" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Lora:wght@400;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />

    <!-- Tailwind + Custom CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary:   '#2563eb',
                        accent:    '#c9a84c',
                        dim:       '#3d4f66',
                        deep:      'var(--bg-deep)',
                        surface:   'var(--bg-surface)',
                        'surface-up': 'var(--bg-surface-up)',
                        edge:      'var(--bg-edge)',
                        body:      'var(--text-body)',
                        muted:     'var(--text-muted)',
                    }
                }
            }
        };
    </script>
    <link rel="stylesheet" href="assets/css/style.css" />
    <style>
        .stat-pill {
            background: rgba(37, 99, 235, 0.08);
            border: 1px solid rgba(37, 99, 235, 0.2);
            border-radius: 99px;
            padding: 4px 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: #60a5fa;
        }
        @keyframes glitch {
            0%, 100% { clip-path: inset(0 0 100% 0); transform: translate(0); }
            10% { clip-path: inset(20% 0 50% 0); transform: translate(-4px, 2px); }
            20% { clip-path: inset(50% 0 20% 0); transform: translate(4px, -2px); }
            30% { clip-path: inset(70% 0 10% 0); transform: translate(-2px, 1px); }
            40% { clip-path: inset(0 0 80% 0); transform: translate(2px, -1px); }
            50% { clip-path: inset(10% 0 60% 0); transform: translate(-3px, 3px); }
            60% { clip-path: inset(60% 0 10% 0); transform: translate(3px, -3px); }
            70% { clip-path: inset(0 0 40% 0); transform: translate(-1px, 2px); }
            80% { clip-path: inset(40% 0 30% 0); transform: translate(1px, -2px); }
            90% { clip-path: inset(0 0 20% 0); transform: translate(2px, 1px); }
        }
        .glitch-text {
            animation: glitch 4s infinite;
            animation-delay: 2s;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Nav -->
    <nav class="fixed top-0 left-0 right-0 z-50 nav-glass border-b border-edge/20">
        <div class="max-w-7xl mx-auto px-6 lg:px-16 h-16 flex items-center justify-between gap-6">
            <a href="index.html" class="flex items-center gap-2.5 shrink-0">
                <div class="w-7 h-7 bg-primary rounded-lg flex items-center justify-center">
                    <span class="material-symbols-outlined text-white text-sm" style="font-variation-settings: 'FILL' 1">shield_lock</span>
                </div>
                <span class="font-heading text-lg font-bold text-white tracking-tight">CMD</span>
            </a>
            <div class="flex items-center gap-3">
                <a href="tel:0943656469" class="btn-primary text-[13px] !py-2.5 !px-5 inline-flex items-center gap-2">
                    <span class="material-symbols-outlined !text-base" style="font-variation-settings: 'FILL' 1">phone</span>
                    Liên hệ ngay
                </a>
            </div>
        </div>
    </nav>

    <main class="flex-1 pt-16 flex items-center justify-center px-6">

        <!-- 404 content -->
        <div class="text-center max-w-lg">
            <!-- Big 404 -->
            <div class="relative inline-block mb-8">
                <div class="font-heading font-bold text-[10rem] lg:text-[14rem] leading-none text-transparent"
                     style="-webkit-text-stroke: 1px var(--bg-edge); opacity: 0.4; user-select: none;">
                    404
                </div>
                <div class="absolute inset-0 font-heading font-bold text-[10rem] lg:text-[14rem] leading-none text-red-500/20 glitch-text flex items-center justify-center">
                    404
                </div>
            </div>

            <div class="w-16 h-16 rounded-2xl bg-primary/10 border border-primary/20 flex items-center justify-center mx-auto mb-6">
                <span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1">search_off</span>
            </div>

            <h1 class="font-heading text-2xl lg:text-3xl font-bold text-white mb-3">
                Trang không tìm thấy
            </h1>
            <p class="text-slate-400 leading-relaxed mb-8">
                Trang bạn đang tìm kiếm có thể đã bị di chuyển, xóa, hoặc không tồn tại.
            </p>

            <!-- Quick links -->
            <div class="flex flex-col sm:flex-row justify-center gap-3 mb-10">
                <a href="index.html" class="btn-primary !px-8 !py-3 flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined !text-base" style="font-variation-settings: 'FILL' 1">home</span>
                    Quay về trang chủ
                </a>
                <a href="demo.html" class="btn-outline !px-8 !py-3 flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined !text-base" style="font-variation-settings: 'FILL' 1">terminal</span>
                    Xem Demo
                </a>
            </div>

            <!-- Or call -->
            <div class="p-4 rounded-xl bg-surface border border-edge/20 inline-block">
                <p class="text-sm text-dim mb-2">Hoặc gọi trực tiếp:</p>
                <a href="tel:0943656469" class="inline-flex items-center gap-2 text-primary font-semibold hover:underline">
                    <span class="material-symbols-outlined !text-base" style="font-variation-settings: 'FILL' 1">phone</span>
                    0943 65 64 69
                </a>
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="pt-12 pb-8 px-6 lg:px-16">

    <!-- Back to top -->
    <button id="back-to-top" aria-label="Quay về đầu trang"
        class="fixed bottom-6 right-6 z-50 w-11 h-11 rounded-xl bg-primary border border-primary/30 flex items-center justify-center
               text-white shadow-lg shadow-primary/25 opacity-0 translate-y-4 pointer-events-none
               transition-all duration-400 hover:bg-primary/90 hover:scale-110 hover:shadow-xl hover:shadow-primary/35
               focus:outline-none focus:ring-2 focus:ring-primary/50 cursor-pointer"
        style="transition: opacity 0.35s ease, transform 0.35s ease, background 0.2s ease, box-shadow 0.2s ease;">
        <span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 1">keyboard_arrow_up</span>
    </button>
        <div class="max-w-7xl mx-auto text-center">
            <p class="text-xs text-dim font-light">© 2022–2026 CMD Security. Bảo lưu mọi quyền.</p>
        </div>
    </footer>

    <script>
        const html = document.documentElement;
        const savedTheme = localStorage.getItem('theme') || 'dark';
        html.className = savedTheme;
        html.classList.add(savedTheme === 'dark' ? 'dark' : 'light');

        // Back to top
        const bttBtn = document.getElementById('back-to-top');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 600) {
                bttBtn.style.opacity = '1';
                bttBtn.style.transform = 'translateY(0)';
                bttBtn.style.pointerEvents = 'auto';
            } else {
                bttBtn.style.opacity = '0';
                bttBtn.style.transform = 'translateY(16px)';
                bttBtn.style.pointerEvents = 'none';
            }
        }, { passive: true });

        bttBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    </script>
</body>
</html>
